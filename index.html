<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lincoln Flight Prices</title>
<style>
  :root{
    --navy:#0d1b4c;
    --navy-2:#152569;
    --blue-text:#1a3fbf;
    --green:#1a7a3c;
    --purple:#6a3fbf;
    --row-a:#eef1fb;
    --row-b:#ffffff;
    --border:#0d1b4c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#f4f6fc;
    color:#0d1b4c;
    padding:24px;
  }
  .page-header{
    text-align:center;
    margin-bottom:20px;
  }
  .page-header h1{
    font-size:2.1rem;
    margin:0;
    color:var(--navy);
    letter-spacing:0.5px;
  }
  .page-header p{
    margin:6px 0 0;
    color:#3a4a8f;
    font-size:0.95rem;
  }

  .controls{
    max-width:1100px;
    margin:0 auto 28px;
    background:var(--navy);
    border-radius:12px;
    padding:18px 24px;
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    box-shadow:0 4px 14px rgba(13,27,76,0.25);
  }
  .control-group{
    display:flex;
    flex-direction:column;
    color:#fff;
    font-size:0.85rem;
    min-width:150px;
  }
  .control-group label{
    margin-bottom:6px;
    font-weight:600;
    color:#cfd8ff;
  }
  .control-group input{
    padding:8px 10px;
    border-radius:6px;
    border:none;
    font-size:0.95rem;
    width:100%;
  }
  .control-group small{
    color:#9fb0ff;
    margin-top:4px;
  }

  .tables-wrap{
    max-width:1500px;
    margin:0 auto;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-start;
  }
  .table-card{
    flex:1 1 640px;
    max-width:900px;
    width:100%;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(13,27,76,0.15);
  }
  .table-card h2{
    margin:0;
    background:var(--navy);
    color:#fff;
    padding:14px 18px;
    font-size:1.15rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .table-card h2 span.sub{
    font-size:0.75rem;
    font-weight:400;
    color:#a9b7ff;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:0.85rem;
  }
  thead th{
    background:var(--navy-2);
    color:#fff;
    padding:8px 6px;
    text-align:center;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.3px;
    position:sticky;
    top:0;
  }
  tbody td{
    padding:8px 6px;
    text-align:center;
    border-bottom:1px solid #e2e6f5;
  }
  tbody tr:nth-child(even){ background:var(--row-a); }
  tbody tr:nth-child(odd){ background:var(--row-b); }
  tbody tr.details-row{ background:#f7f9ff !important; }

  td.price-total{
    color:var(--blue-text);
    font-weight:700;
    font-size:0.95rem;
  }
  td.rank{
    font-weight:700;
    color:var(--navy);
  }
  .type-wed{ color:var(--green); font-weight:600; white-space:nowrap; }
  .type-sat{ color:var(--purple); font-weight:600; white-space:nowrap; }

  .savings{
    color:#b3161c;
    font-weight:600;
  }

  .detail-btn{
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:5px;
    padding:5px 10px;
    font-size:0.75rem;
    cursor:pointer;
  }
  .detail-btn:hover{ background:var(--navy-2); }

  .details-content{
    text-align:left;
    padding:12px 18px;
    font-size:0.82rem;
    line-height:1.5;
  }
  .details-content .leg{
    padding:6px 0;
    border-bottom:1px dashed #cfd6ee;
  }
  .details-content .leg:last-child{ border-bottom:none; }
  .details-content .airline{
    font-weight:700;
    color:var(--navy);
  }
  .breakdown{
    display:flex;
    gap:18px;
    margin-top:8px;
    flex-wrap:wrap;
    color:#3a4a8f;
  }

  .status-msg{
    text-align:center;
    padding:30px;
    color:#3a4a8f;
    font-style:italic;
  }

  .dest-tabs{
    max-width:1100px;
    margin:0 auto 18px;
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .dest-btn{
    background:#dfe4f7;
    color:var(--navy);
    border:none;
    border-radius:8px;
    padding:10px 26px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    transition:background 0.15s, color 0.15s;
  }
  .dest-btn:hover{ background:#c7cff2; }
  .dest-btn.active{
    background:var(--navy);
    color:#fff;
  }

  @media (max-width: 720px){
    table{ font-size:0.72rem; }
    .table-card{ min-width:100%; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Lincoln Flight Prices</h1>
  <p>Base fare, ranked cheapest to most expensive &mdash; adjust seat selection, baggage, and promo code below</p>
</div>

<div class="dest-tabs">
  <button class="dest-btn active" id="tab-las" onclick="selectDest('las')">Las Vegas</button>
  <button class="dest-btn" id="tab-sna" onclick="selectDest('sna')">Los Angeles</button>
</div>

<div class="controls">
  <div class="control-group">
    <label for="seatCost">Seat Selection ($)</label>
    <input type="number" id="seatCost" value="0" min="0" step="1">
    <small>Random seat = $0</small>
  </div>
  <div class="control-group">
    <label for="bagCost">Baggage ($)</label>
    <input type="number" id="bagCost" value="70" min="0" step="1">
    <small>$35*2 Flights</small>
  </div>
  <div class="control-group">
    <label for="promoCode">Promo Code (% off base fare)</label>
    <input type="number" id="promoCode" value="0" min="0" max="100" step="1">
    <small>Applies to base fare only</small>
  </div>
</div>

<div class="tables-wrap">
  <div class="table-card" id="card-las">
    <h2>Lincoln &rarr; Las Vegas (LAS) <span class="sub">LNK-LAS</span></h2>
    <div id="content-las" class="status-msg">Loading flights&hellip;</div>
  </div>
  <div class="table-card" id="card-sna" style="display:none;">
    <h2>Lincoln &rarr; Orange County (SNA) <span class="sub">LNK-SNA</span></h2>
    <div id="content-sna" class="status-msg">Loading flights&hellip;</div>
  </div>
</div>

<script>
const FILES = {
  las: { url: 'lnk_las_6months.json', contentId: 'content-las', data: null },
  sna: { url: 'lnk_sna_6months.json', contentId: 'content-sna', data: null }
};

function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[m-1] + ' ' + d;
}

function fmtDuration(mins){
  if(mins == null) return '';
  const h = Math.floor(mins/60), m = mins%60;
  return h + 'h ' + (m ? m + 'm' : '');
}

function fmtTime(dt){
  if(!dt) return '';
  const parts = dt.split(' ');
  return parts[1] ? parts[1] : dt;
}

function tripTypeLabel(tripType){
  // "Wednesday-Saturday" or "Saturday-Wednesday"
  if(/^Wed/i.test(tripType)) return { label: 'Wed\u2013Sat', cls: 'type-wed' };
  if(/^Sat/i.test(tripType)) return { label: 'Sat\u2013Wed', cls: 'type-sat' };
  return { label: tripType, cls: '' };
}

async function loadFlights(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error('Failed to load ' + url);
  const raw = await res.json();

  const rows = [];
  raw.forEach(entry => {
    const r = entry.results || {};
    const flightOptions = r.best_flights || r.other_flights || [];
    let basePrice = null;
    let flightInfo = null;

    if(flightOptions.length){
      flightOptions.forEach(f => {
        if(basePrice === null || f.price < basePrice){
          basePrice = f.price;
          flightInfo = f;
        }
      });
    } else if(r.price_insights && r.price_insights.lowest_price != null){
      basePrice = r.price_insights.lowest_price;
    }

    if(basePrice == null) return;

    rows.push({
      outbound: entry.outbound_date,
      returnDate: entry.return_date,
      tripType: entry.trip_type,
      basePrice,
      flightInfo
    });
  });

  rows.sort((a,b) => a.basePrice - b.basePrice);
  return rows;
}

function buildLegsHtml(flightInfo){
  if(!flightInfo || !flightInfo.flights || !flightInfo.flights.length){
    return '<div class="leg">No flight leg details available.</div>';
  }
  return flightInfo.flights.map(leg => {
    const dep = leg.departure_airport || {};
    const arr = leg.arrival_airport || {};
    return `<div class="leg">
      <span class="airline">${leg.airline || ''} ${leg.flight_number || ''}</span><br>
      ${dep.id || ''} ${fmtTime(dep.time)} &rarr; ${arr.id || ''} ${fmtTime(arr.time)}<br>
      Duration: ${fmtDuration(leg.duration)}${leg.airplane ? ' &middot; ' + leg.airplane : ''}${leg.legroom ? ' &middot; Legroom: ' + leg.legroom : ''}
    </div>`;
  }).join('');
}

function render(key){
  const cfg = FILES[key];
  const container = document.getElementById(cfg.contentId);
  if(!cfg.data || !cfg.data.length){
    container.innerHTML = '<div class="status-msg">No flight data available.</div>';
    return;
  }

  const seatCost = parseFloat(document.getElementById('seatCost').value) || 0;
  const bagCost = parseFloat(document.getElementById('bagCost').value) || 0;
  const promoPct = Math.min(100, Math.max(0, parseFloat(document.getElementById('promoCode').value) || 0));

  let html = `<table>
    <thead>
      <tr>
        <th>#</th>
        <th>Total</th>
        <th>Base Fare</th>
        <th>Promo Savings</th>
        <th>Seat Sel.</th>
        <th>Baggage</th>
        <th>Outbound</th>
        <th>Return</th>
        <th>Type</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>`;

  cfg.data.forEach((row, i) => {
    const promoSavings = row.basePrice * (promoPct/100);
    const discountedBase = row.basePrice - promoSavings;
    const total = discountedBase + seatCost + bagCost;
    const type = tripTypeLabel(row.tripType);
    const rowId = key + '-row-' + i;

    html += `<tr>
      <td class="rank">${i+1}</td>
      <td class="price-total">$${total.toFixed(0)}+</td>
      <td>$${row.basePrice.toFixed(0)}</td>
      <td class="savings">${promoSavings > 0 ? '-$' + promoSavings.toFixed(0) : '$0'}</td>
      <td>$${seatCost.toFixed(0)}</td>
      <td>$${bagCost.toFixed(0)}</td>
      <td>${fmtDate(row.outbound)}</td>
      <td>${fmtDate(row.returnDate)}</td>
      <td class="${type.cls}">${type.label}</td>
      <td><button class="detail-btn" onclick="toggleDetails('${rowId}')">View</button></td>
    </tr>
    <tr class="details-row" id="${rowId}" style="display:none;">
      <td colspan="10">
        <div class="details-content">
          ${buildLegsHtml(row.flightInfo)}
          <div class="breakdown">
            <span>Base Fare: $${row.basePrice.toFixed(0)}</span>
            <span>Promo (${promoPct}%): -$${promoSavings.toFixed(0)}</span>
            <span>Seat Selection: $${seatCost.toFixed(0)}</span>
            <span>Baggage: $${bagCost.toFixed(0)}</span>
            <span><strong>Total: $${total.toFixed(0)}</strong></span>
          </div>
        </div>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function toggleDetails(rowId){
  const el = document.getElementById(rowId);
  if(el) el.style.display = (el.style.display === 'none') ? 'table-row' : 'none';
}

function selectDest(dest){
  const isLas = dest === 'las';
  document.getElementById('card-las').style.display = isLas ? '' : 'none';
  document.getElementById('card-sna').style.display = isLas ? 'none' : '';
  document.getElementById('tab-las').classList.toggle('active', isLas);
  document.getElementById('tab-sna').classList.toggle('active', !isLas);
}

function renderAll(){
  Object.keys(FILES).forEach(render);
}

async function init(){
  for(const key of Object.keys(FILES)){
    const cfg = FILES[key];
    try{
      cfg.data = await loadFlights(cfg.url);
    }catch(err){
      document.getElementById(cfg.contentId).innerHTML =
        `<div class="status-msg">Could not load ${cfg.url}. Make sure this file is in the same folder as index.html.</div>`;
      cfg.data = [];
    }
  }
  renderAll();
}

['seatCost','bagCost','promoCode'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderAll);
});

init();
</script>
</body>
</html>
