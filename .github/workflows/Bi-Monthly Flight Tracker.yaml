name: Bi-Monthly Flight Tracker
on:
  schedule:
    # Runs at 12:00 UTC on the 1st and 15th of every month
    - cron: '0 12 1,15 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4[cite: 1]

      - name: Set up Python
        uses: actions/setup-python@v5[cite: 1]
        with:
          python-version: '3.11'[cite: 1]

      - name: Install dependencies
        run: pip install requests[cite: 1]

      - name: Run Vegas Flight Tracker
        run: python VegasFlights.py
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Run LA Flight Tracker
        run: python LAFlights.py
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"[cite: 1]
          
          # Adjust these if your flight scripts output specific file names
          git add *.csv
          git add *.json
          
          git commit -m "Automated Bi-Monthly Flight Update" || exit 0[cite: 1]
          git push[cite: 1]
