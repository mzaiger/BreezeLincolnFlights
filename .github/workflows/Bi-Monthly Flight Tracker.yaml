name: Bi-Monthly Flight Tracker
on:
  schedule:
    # Runs at 12:00 UTC on the 1st and 15th of every month
    - cron: '0 12 1,15 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Retained 'requests' as it is standard. Add any other libraries your flight scripts require.
        run: pip install requests

      - name: Run Vegas Flight Tracker
        run: python VegasFlights.py

      - name: Run LA Flight Tracker
        run: python LAFlights.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Using wildcards to stage any CSV or JSON files generated by the two scripts
          git add *.csv
          git add *.json
          
          git commit -m "Automated Bi-Monthly Flight Update" || exit 0
          git push
